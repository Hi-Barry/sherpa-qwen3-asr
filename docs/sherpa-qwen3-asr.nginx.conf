# ==========================================================================
# sherpa-qwen3-asr — Nginx 反向代理配置模板
#
# 使用方式：
#   1. 复制到 /etc/nginx/sites-available/
#   2. 将 your-domain.com 改为你的实际域名
#   3. ln -sf 到 /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# 详见 docs/vps-deploy.md
# ==========================================================================

upstream sherpa_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name your-domain.com;

    # 文件上传大小限制
    client_max_body_size 60M;

    # Let's Encrypt 验证（certbot 可能需要）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他请求全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 站点（需先申请证书） ----
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（由 certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # 文件上传大小限制（对应 config.yaml 中的 max_file_size）
    client_max_body_size 60M;

    # ---- 健康检查 ----
    location /api/v1/health {
        proxy_pass http://sherpa_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- ASR 识别接口 ----
    location /api/v1/recognize {
        proxy_pass http://sherpa_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长音频请求超时（与 max_audio_duration 对应）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 禁用缓冲（大文件上传时减少内存占用）
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ---- OpenAI 兼容接口 ----
    location /v1/ {
        proxy_pass http://sherpa_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ---- Swagger UI 文档 ----
    location /docs {
        proxy_pass http://sherpa_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://sherpa_backend;
        proxy_set_header Host $host;
    }

    # ---- 拒绝未匹配的路径（安全） ----
    location / {
        return 404;
    }
}
