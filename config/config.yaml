# sherpa-qwen3-asr Configuration
# All paths are relative to project root, or absolute

service:
  host: "0.0.0.0"
  port: 8000

models:
  # Qwen3-ASR 0.6B int8 — downloaded by scripts/download_models.sh
  qwen3_asr_dir: "models/qwen3-asr"

asr:
  # Provider: "cpu" for CPU-only, "cuda" for NVIDIA GPU
  # Switch to "cpu" if using the CPU-only venv (venv/ instead of venv-gpu/)
  provider: "cuda"
  num_threads: 2
  # Qwen3-ASR offline path uses feature_dim=128 (NOT 80 like SenseVoice/Whisper)
  feature_dim: 128
  # Maximum KV cache sequence length.
  # Qwen3-ASR conv_frontend stride=4 → each encoder frame ≈ 40ms audio.
  #  512 tokens ~ 20s (too small — was the root cause of long-audio crashes)
  #  2048 tokens ~ 82s
  #  4096 tokens ~ 164s
  # With max_chunk_duration=30s below, 2048 is more than enough.
  max_total_len: 2048
  # Maximum new tokens to generate per utterance.
  # Increased from 128 to 256 to handle longer sentences.
  max_new_tokens: 256
  # Sampling parameters (very low temperature = deterministic)
  temperature: 0.000001  # = 1e-6
  top_p: 0.8
  seed: 42
  # Optional comma-separated hotwords: "foo,bar,baz"
  hotwords: ""

queue:
  # Background task queue — serializes ASR processing per request.
  # Requests queue up when the server is busy processing previous audio.
  max_size: 10        # Max queued requests (429 beyond this)
  timeout: 300        # Per-request processing timeout (seconds)

processing:
  max_file_size: 52428800         # 50 MB max upload
  max_audio_duration: 3600        # 1 hour max
  temp_dir: "/tmp/sherpa-qwen3-asr"
  # Force-split audio into chunks ≤ this duration (seconds).
  # This is the primary safety guard against Qwen3-ASR's finite context
  # window. Each chunk is processed independently and results are merged.
  # Recommended: 30s (matches Qwen3-ASR's designed operating range).
  max_chunk_duration: 30
  # Audio preprocessing options
  preprocess:
    # Normalize audio to [-1.0, 1.0] range
    normalize: true
    # High-pass filter cutoff (Hz). 0 = disabled.
    # Typical: 80 (removes low-frequency hum/noise)
    highpass_cutoff: 80

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
